<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQVKfqJcF0O8ZnHvBjphHn7zo4avChxzN6-qQ&s" class="avatar">
      <div>
        <span class="name">Caroliny</span>
        <span class="username">@cvasconcelos</span>
      </div>
    </div>

    <p class="post-text">
      Estudei muito hoje!
    </p>

    <div class="post-actions">
      <button id="likeBtn"> curtir</button>
      <span id="likeCount">0</span>
      <button id="dislikeBtn"> Descurtir</button>
      <span id="dislikeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="https://i.pinimg.com/736x/03/94/85/0394859a7f9c6247041f9f3cc5fe78bb.jpg" class="avatar-small">
        <p>Dormi muito hoje</p>
      </div>

      <div class="comment">
        <img src="https://i.pinimg.com/736x/e0/8f/d0/e08fd04f9196fe663838a7c66c9ef91f.jpg" class="avatar-small">
        <p>Eu também!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
